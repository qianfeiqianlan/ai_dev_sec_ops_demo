name: Image Security

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      image:
        description: Image reference to scan
        required: false
        type: string

permissions:
  contents: read
  packages: read
  security-events: write

env:
  DEFAULT_IMAGE: ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name || github.sha }}

jobs:
  scan:
    name: Scan image and generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image
        id: image
        run: |
          IMAGE="${{ inputs.image }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="${{ env.DEFAULT_IMAGE }}"
          fi
          echo "ref=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.ref }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
