<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">DevSecOps Command Center Architecture</title>
  <desc id="desc">A command center style DevSecOps flow showing observability panels for local checks, pull request gates, security scans, AI review, release, Docker, image security, and auditable evidence.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182235" />
      <stop offset="100%" stop-color="#0b1120" />
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="45%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#38bdf8" />
    </marker>
    <style>
      .bg { fill: #090e1a; }
      .screen { fill: url(#panel); stroke: #334155; stroke-width: 1.5; filter: url(#shadow); }
      .hud { fill: rgba(15, 23, 42, 0.86); stroke: #38bdf8; stroke-width: 1.3; }
      .hud2 { fill: rgba(15, 23, 42, 0.86); stroke: #a78bfa; stroke-width: 1.3; }
      .hud3 { fill: rgba(15, 23, 42, 0.86); stroke: #fb923c; stroke-width: 1.3; }
      .title { fill: #f8fafc; font: 800 36px Arial, sans-serif; }
      .subtitle { fill: #93c5fd; font: 16px Arial, sans-serif; }
      .label { fill: #ffffff; font: 700 17px Arial, sans-serif; }
      .text { fill: #cbd5e1; font: 13px Arial, sans-serif; }
      .mono { fill: #67e8f9; font: 12px Consolas, monospace; }
      .line { fill: none; stroke: #38bdf8; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #64748b; stroke-width: 1; }
      .dot { fill: #22c55e; }
      .warn { fill: #f59e0b; }
      .danger { fill: #ef4444; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980" />
  <rect x="70" y="72" width="1460" height="820" rx="30" fill="url(#screen)" opacity="0.28" />
  <rect class="screen" x="100" y="100" width="1400" height="760" rx="24" />

  <text class="title" x="800" y="158" text-anchor="middle">DevSecOps Command Center</text>
  <text class="subtitle" x="800" y="188" text-anchor="middle">Every commit becomes observable, testable, reviewable, scannable, and traceable</text>

  <rect class="hud" x="150" y="250" width="300" height="420" rx="18" />
  <text class="label" x="300" y="286" text-anchor="middle">LOCAL CONTROL</text>
  <circle class="dot" cx="185" cy="330" r="6" />
  <text class="mono" x="205" y="335">pre-commit: prettier eslint cspell</text>
  <circle class="dot" cx="185" cy="390" r="6" />
  <text class="mono" x="205" y="395">commit-msg: conventional commits</text>
  <circle class="dot" cx="185" cy="450" r="6" />
  <text class="mono" x="205" y="455">pre-push: unit + e2e tests</text>
  <circle class="dot" cx="185" cy="510" r="6" />
  <text class="mono" x="205" y="515">feature branch: ready for PR</text>
  <rect x="185" y="570" width="230" height="48" rx="12" fill="#0f172a" stroke="#38bdf8" />
  <text class="text" x="300" y="600" text-anchor="middle">Fast feedback before push</text>

  <rect class="hud2" x="520" y="235" width="560" height="450" rx="18" />
  <text class="label" x="800" y="272" text-anchor="middle">GITHUB PULL REQUEST GATE</text>
  <rect x="560" y="315" width="210" height="82" rx="14" fill="#111827" stroke="#38bdf8" />
  <text class="label" x="665" y="347" text-anchor="middle">Quality</text>
  <text class="text" x="665" y="371" text-anchor="middle">format / lint / test / build</text>
  <rect x="830" y="315" width="210" height="82" rx="14" fill="#111827" stroke="#38bdf8" />
  <text class="label" x="935" y="347" text-anchor="middle">Policy</text>
  <text class="text" x="935" y="371" text-anchor="middle">title / branch / dependabot</text>
  <rect x="560" y="440" width="210" height="82" rx="14" fill="#111827" stroke="#fb923c" />
  <text class="label" x="665" y="472" text-anchor="middle">Security</text>
  <text class="text" x="665" y="496" text-anchor="middle">audit / secrets / SAST</text>
  <rect x="830" y="440" width="210" height="82" rx="14" fill="#111827" stroke="#fb923c" />
  <text class="label" x="935" y="472" text-anchor="middle">CodeQL</text>
  <text class="text" x="935" y="496" text-anchor="middle">semantic analysis</text>
  <rect x="605" y="565" width="390" height="70" rx="16" fill="#111827" stroke="#a78bfa" />
  <text class="label" x="800" y="594" text-anchor="middle">Claude Code Review</text>
  <text class="text" x="800" y="618" text-anchor="middle">risk-focused AI reviewer for API, tests, and security</text>

  <rect class="hud3" x="1150" y="250" width="300" height="420" rx="18" />
  <text class="label" x="1300" y="286" text-anchor="middle">DELIVERY BAY</text>
  <circle class="warn" cx="1185" cy="330" r="6" />
  <text class="mono" x="1205" y="335">release-please: changelog</text>
  <circle class="warn" cx="1185" cy="390" r="6" />
  <text class="mono" x="1205" y="395">docker buildx: image</text>
  <circle class="warn" cx="1185" cy="450" r="6" />
  <text class="mono" x="1205" y="455">trivy: image scan</text>
  <circle class="warn" cx="1185" cy="510" r="6" />
  <text class="mono" x="1205" y="515">sbom: spdx json</text>
  <rect x="1185" y="570" width="230" height="48" rx="12" fill="#0f172a" stroke="#fb923c" />
  <text class="text" x="1300" y="600" text-anchor="middle">Auditable release artifacts</text>

  <path class="line" d="M450 460 H520" />
  <path class="line" d="M1080 460 H1150" />
  <path class="soft" d="M665 397 V440 M935 397 V440 M770 481 H830 M800 522 V565" />
  <path class="line" d="M800 635 C800 745 1300 745 1300 670" />
  <path class="line" d="M800 635 C800 745 300 745 300 670" />

  <rect x="250" y="748" width="1100" height="54" rx="18" fill="#0f172a" stroke="#334155" />
  <text class="label" x="800" y="782" text-anchor="middle">Outcome: protected main branch, safer PRs, AI-assisted review, traceable releases, scanned containers</text>
</svg>
